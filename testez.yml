---
# Selene std-library extension describing the globals TestEZ injects into spec
# files at runtime. Referenced from selene.toml via `std = "roblox+testez"`.
base: roblox
globals:
  describe:
    args:
      - type: string
      - type: function
  fdescribe:
    args:
      - type: string
      - type: function
  xdescribe:
    args:
      - type: string
      - type: function
  it:
    args:
      - type: string
      - type: function
  fit:
    args:
      - type: string
      - type: function
  xit:
    args:
      - type: string
      - type: function
  itFOCUS:
    args:
      - type: string
      - type: function
  itSKIP:
    args:
      - type: string
      - type: function
  itFIXME:
    args:
      - type: string
      - type: function
  describeFOCUS:
    args:
      - type: string
      - type: function
  describeSKIP:
    args:
      - type: string
      - type: function
  FOCUS:
    args: []
  SKIP:
    args: []
  FIXME:
    args:
      - required: false
  beforeAll:
    args:
      - type: function
  beforeEach:
    args:
      - type: function
  afterAll:
    args:
      - type: function
  afterEach:
    args:
      - type: function
  expect:
    args:
      - required: true
    method: false
